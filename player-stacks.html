<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Best Ball Exposure — Player Stacks</title>
  <script>(function(){try{var t=localStorage.getItem('bb_theme');if(!t)t=window.matchMedia&&matchMedia('(prefers-color-scheme: light)').matches?'light':'dark';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div id="nav-slot"></div>
  <main>
    <h1>Player stacks</h1>
    <p class="lede">Which combinations of <em>specific players</em> appear together most often on your rosters. Defaults to QB-anchored stacks (every shown stack contains at least one QB). Untick the box to see all pairings regardless of position.</p>

    <div class="toolbar">
      <input type="search" id="search" placeholder="Search player or stack type…" style="min-width:240px;" />
      <select id="size-filter">
        <option value="2">2-player stacks</option>
        <option value="3">3-player stacks</option>
      </select>
      <label class="checkbox-pill">
        <input type="checkbox" id="all-toggle" />
        <span>Show all stacks (any position)</span>
      </label>
      <select id="platform-filter">
        <option value="">All platforms</option>
      </select>
      <select id="tournament-filter">
        <option value="">All tournaments</option>
      </select>
      <label style="margin-left:auto;"><span id="row-count">0</span> stacks</label>
    </div>

    <div id="content"></div>
  </main>

  <footer class="site">All data stored locally.</footer>
  <script src="assets/data.js"></script>
  <script src="assets/app.js"></script>
  <script src="assets/nav.js"></script>
  <script src="assets/player-stacks.js"></script>
</body>
</html>
