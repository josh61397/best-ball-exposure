name: Refresh ADP

on:
  schedule:
    # 10:00 UTC daily ~= 6:00 AM ET / 3:00 AM PT
    - cron: "0 10 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests beautifulsoup4

      - name: Scrape ADP
        run: python scripts/refresh_adp.py

      - name: Commit if changed
        id: commit
        run: |
          if [[ -n "$(git status --porcelain assets/data.js data/adp.json data/history)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/data.js data/adp.json data/history
            git commit -m "chore: refresh ADP $(date -u +%Y-%m-%d)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No ADP changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      # Auto-commits by GITHUB_TOKEN don't trigger downstream workflows,
      # so explicitly kick off the Pages deploy.
      - name: Trigger Pages deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages.yml --ref main
