<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Best Ball Exposure — Stacks</title>
  <script>(function(){try{var t=localStorage.getItem('bb_theme');if(!t)t=window.matchMedia&&matchMedia('(prefers-color-scheme: light)').matches?'light':'dark';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div id="nav-slot"></div>
  <main>
    <h1>Stacks</h1>
    <p class="lede" id="page-lede"></p>

    <div class="seg-toggle" id="view-toggle" role="tablist" style="margin-bottom:16px;">
      <button type="button" data-view="team" class="active">Team</button>
      <button type="button" data-view="player">Player</button>
    </div>

    <div class="toolbar">
      <input type="search" id="search" placeholder="Search…" />
      <select id="size-filter" data-player-only style="display:none;">
        <option value="2">2-player stacks</option>
        <option value="3">3-player stacks</option>
      </select>
      <label class="checkbox-pill" data-player-only style="display:none;">
        <input type="checkbox" id="all-toggle" />
        <span>Show all stacks (any position)</span>
      </label>
      <select id="platform-filter">
        <option value="">All platforms</option>
      </select>
      <select id="tournament-filter">
        <option value="">All tournaments</option>
      </select>
      <label style="margin-left:auto;"><span id="row-count">0</span> <span id="row-label">teams</span></label>
    </div>

    <div id="content"></div>
  </main>

  <footer class="site">All data stored locally.</footer>
  <script src="assets/data.js"></script>
  <script src="assets/app.js"></script>
  <script src="assets/nav.js"></script>
  <script src="assets/stacks.js"></script>
</body>
</html>
