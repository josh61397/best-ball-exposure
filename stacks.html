<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Best Ball Exposure — Stacks</title>
  <script>(function(){try{var t=localStorage.getItem('bb_theme');if(!t)t=window.matchMedia&&matchMedia('(prefers-color-scheme: light)').matches?'light':'dark';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div id="nav-slot"></div>
  <main>
    <h1>Team stacks</h1>
    <p class="lede">Your roster construction grouped by NFL team. A <strong>stack</strong> = a roster with 2+ players from the same team. <strong>Top Combo</strong> shows the most common position composition on your stacked rosters for that team.</p>

    <div class="toolbar">
      <input type="search" id="search" placeholder="Search team or combo…" />
      <select id="platform-filter">
        <option value="">All platforms</option>
      </select>
      <select id="tournament-filter">
        <option value="">All tournaments</option>
      </select>
      <label style="margin-left:auto;"><span id="row-count">0</span> teams</label>
    </div>

    <div id="content"></div>
  </main>

  <footer class="site">All data stored locally.</footer>
  <script src="assets/data.js"></script>
  <script src="assets/app.js"></script>
  <script src="assets/nav.js"></script>
  <script src="assets/stacks.js"></script>
</body>
</html>
